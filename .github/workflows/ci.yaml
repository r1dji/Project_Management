name: Linting Python

on:
  pull_request:
    branches: [s3_branch]
    types: [closed]

jobs:
  lint:
    if : github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: pip install ruff
      - run: |
        ruff check .
        ruff fix .


