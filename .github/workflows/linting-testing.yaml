name: Linting Python

on:
  pull_request:
    branches: [s3_branch]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
      - run: pip install "ruff==0.15.8"
      - run: ruff check . || true
      - run: ruff fix .